name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lexical-binding:
    name: Check lexical-binding directives
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify all .el files have lexical-binding on line 1
        run: |
          bad=$(find . -name "*.el" | while read f; do
            head -1 "$f" | grep -qF "lexical-binding: t" || echo "$f"
          done)
          if [ -n "$bad" ]; then
            echo "Files missing lexical-binding directive:"
            echo "$bad"
            exit 1
          fi

  byte-compile:
    name: Byte-compile (Emacs ${{ matrix.emacs-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        emacs-version: ['29.4', '30.1']
    steps:
      - uses: actions/checkout@v4
      - uses: purcell/setup-emacs@7a92187aa5b5a3b854cbdfa47499fbd3d1207163  # v7.0
        with:
          version: ${{ matrix.emacs-version }}
      - name: Byte-compile all source files
        run: |
          emacs --batch -L . -L providers \
            --eval '(setq byte-compile-error-on-warn t)' \
            -f batch-byte-compile \
            copilot-agent-tools.el \
            copilot-agent-api.el \
            copilot-agent-status.el \
            copilot-agent-ui.el \
            providers/copilot-agent-anthropic.el \
            providers/copilot-agent-gemini.el \
            providers/copilot-agent-qwen.el \
            providers/copilot-agent-github-copilot.el \
            copilot-agent.el
      - name: Byte-compile test files
        run: |
          emacs --batch -L . -L providers -L test \
            --eval '(setq byte-compile-error-on-warn t)' \
            -f batch-byte-compile \
            test/test-copilot-agent-tools.el \
            test/test-copilot-agent-api.el \
            test/test-copilot-agent-anthropic.el \
            test/test-copilot-agent-gemini.el \
            test/test-copilot-agent-qwen.el \
            test/test-copilot-agent-status.el \
            test/test-copilot-agent-ui.el \
            test/test-regressions.el

  package-lint:
    name: package-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: purcell/setup-emacs@7a92187aa5b5a3b854cbdfa47499fbd3d1207163  # v7.0
        with:
          version: '30.1'
      - name: Install package-lint
        run: |
          emacs --batch \
            --eval "(require 'package)" \
            --eval "(add-to-list 'package-archives '(\"melpa\" . \"https://melpa.org/packages/\") t)" \
            --eval "(package-initialize)" \
            --eval "(package-refresh-contents)" \
            --eval "(package-install 'package-lint)"
      - name: Run package-lint
        run: |
          emacs --batch -L . -L providers \
            --eval "(require 'package)" \
            --eval "(add-to-list 'package-archives '(\"melpa\" . \"https://melpa.org/packages/\") t)" \
            --eval "(package-initialize)" \
            --eval "(setq package-lint-main-file \"copilot-agent.el\")" \
            -f package-lint-batch-and-exit \
            copilot-agent.el \
            copilot-agent-tools.el \
            copilot-agent-api.el \
            copilot-agent-ui.el \
            copilot-agent-status.el

  ert-tests:
    name: ERT tests (Emacs ${{ matrix.emacs-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        emacs-version: ['29.4', '30.1']
    steps:
      - uses: actions/checkout@v4
      - uses: purcell/setup-emacs@7a92187aa5b5a3b854cbdfa47499fbd3d1207163  # v7.0
        with:
          version: ${{ matrix.emacs-version }}
      - name: Run ERT test suite
        run: emacs --batch -l test/run-tests.el
